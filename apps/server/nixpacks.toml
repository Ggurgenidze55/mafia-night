[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd /app && npm install --workspace=@mafia-night/server --workspace=@mafia-night/shared --ignore-scripts"]

[phases.build]
cmds = ["cd /app/apps/server && npx prisma generate"]

[start]
cmd = "cd /app/apps/server && npx tsx src/index.ts"
